<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Police Claw Windows Download</title>
  <script>
    (async () => {
      try {
        const response = await fetch("./manifest.json", { headers: { Accept: "application/json" } });
        const manifest = await response.json();
        if (manifest.available && manifest.download_url) {
          window.location.replace(manifest.download_url);
        }
      } catch (error) {}
    })();
  </script>
</head>
<body>
  <p>Redirecting to the latest Police Claw Windows installer.</p>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Police Claw macOS Download</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI Variable", sans-serif;
      background: linear-gradient(135deg, #f4f0e8 0%, #edf5f1 48%, #f9efe6 100%);
      color: #182026;
    }
    main {
      width: min(560px, calc(100vw - 32px));
      padding: 28px;
      border-radius: 24px;
      border: 1px solid rgba(24, 32, 38, 0.12);
      background: rgba(255, 251, 245, 0.88);
      box-shadow: 0 18px 60px rgba(25, 35, 43, 0.12);
    }
    a {
      color: inherit;
    }
  </style>
  <script>
    (async () => {
      const message = document.getElementById("message");
      const action = document.getElementById("action");
      try {
        const response = await fetch("./manifest.json", { headers: { Accept: "application/json" } });
        const manifest = await response.json();
        if (manifest.available && manifest.download_url) {
          message.textContent = "Redirecting to the latest Police Claw macOS archive.";
          window.location.replace(manifest.download_url);
          return;
        }
        message.textContent = "The macOS package has not been published yet.";
        action.href = manifest.release_url || "https://github.com/kzhangmyang-cmyk/Xpoliceclaw/releases/latest";
      } catch (error) {
        message.textContent = "The macOS package is not available right now.";
      }
    })();
  </script>
</head>
<body>
  <main>
    <h1>Police Claw for macOS</h1>
    <p id="message">Checking the latest macOS package.</p>
    <p><a id="action" href="https://github.com/kzhangmyang-cmyk/Xpoliceclaw/releases/latest">Open GitHub Releases</a></p>
  </main>
</body>
</html>
